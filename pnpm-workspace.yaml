packages:
  - packages/*
  - vscode
  - inspect-extension

allowBuilds:
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  simple-git-hooks: true

catalog:
  '@mpxjs/core': ^2.11.0
  '@types/node': ^22.15.32
  '@types/path-browserify': ^1.0.3
  '@types/semver': ^7.7.0
  '@volar/language-core': ~2.4.28
  '@volar/language-server': ~2.4.28
  '@volar/language-service': ~2.4.28
  '@volar/typescript': ~2.4.28
  '@volar/vscode': ~2.4.28
  '@vue/compiler-dom': ^3.5.0
  path-browserify: ^1.0.1
  reactive-vscode: ^0.4.1
  stylus: ^0.64.0
  typescript: ^6.0.3
  vscode-uri: ^3.1.0

onlyBuiltDependencies:
  - '@vscode/vsce-sign'
  - esbuild
  - keytar
  - nx
  - simple-git-hooks

overrides:
  stylus: 0.64.0

peerDependencyRules:
  allowedVersions:
    vue-flow-layout>vue: '2'
